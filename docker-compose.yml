version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: relatorio_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./reports/relatorios.db
      - PYTHONPATH=/app
    volumes:
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./reports:/app/reports
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: relatorio_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0
