version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: relatorio_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/backend:/app
      - ./uploads:/app/uploads
      - ./exports:/app/exports
      - ./reports:/app/reports
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: relatorio_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host
